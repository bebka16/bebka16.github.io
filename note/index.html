<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Decibel Note · Extensions</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: #f6f8fa;
      color: #24292f;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      line-height: 1.5;
      padding: 2rem 1.5rem;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      margin-top: 0;
      padding-top: 0;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      width: 100%;
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    .header {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      align-items: baseline;
      padding-bottom: 0.7rem;
      padding-top: 0.7rem;
      border-bottom: 1px solid #d0d7de;
      margin-bottom: 1.5rem;
    }

    .header-left h1 {
      font-size: 16px;
      font-weight: 600;
      letter-spacing: -0.02em;
      color: #24292f;
    }

    .header-left .sub {
      font-size: 0.85rem;
      color: #57606a;
      margin-top: 0.05rem;
    }

    .header-right {
      display: flex;
      gap: 1.5rem;
      font-size: 0.85rem;
      flex-wrap: wrap;
      align-items: center;
    }

    .header-right a {
      color: #0969da;
      text-decoration: none;
      font-weight: 500;
      border-bottom: 1px solid transparent;
      transition: border-color 0.2s;
      cursor: pointer;
    }

    .header-right a:hover {
      border-bottom-color: #0969da;
    }

    .section-title {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 0.8rem;
      color: #24292f;
      letter-spacing: -0.01em;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .extensions-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1.2rem;
      margin-bottom: 2rem;
    }

    .extension-card {
      background: #ffffff;
      border: 1px solid #d0d7de;
      border-radius: 2px;
      padding: 1rem 1rem 0.8rem;
      transition: border-color 0.2s, box-shadow 0.2s;
      display: flex;
      flex-direction: column;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.08);
      position: relative;
    }

    .extension-card:hover {
      border-color: #8b949e;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.12);
    }

    .extension-card.custom {
      border-left: 3px solid #0969da;
    }

    .custom-badge {
      position: absolute;
      top: 8px;
      right: 8px;
      background: #0969da;
      color: white;
      font-size: 0.6rem;
      padding: 2px 6px;
      border-radius: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .extension-name {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 0.3rem;
      color: #24292f;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding-right: 50px;
    }

    .extension-name .version {
      font-size: 0.7rem;
      font-weight: 400;
      color: #57606a;
      background: #f0f6fc;
      padding: 0.1rem 0.4rem;
      border-radius: 10px;
      border: 1px solid #d0d7de;
    }

    .extension-description {
      font-size: 0.82rem;
      color: #57606a;
      margin-bottom: 1rem;
      flex: 1;
    }

    .extension-author {
      font-size: 0.75rem;
      color: #656d76;
      margin-bottom: 0.6rem;
      display: flex;
      align-items: center;
      gap: 0.3rem;
    }

    .tag-group {
      display: flex;
      flex-wrap: wrap;
      gap: 0.3rem 0.5rem;
      margin: 0.5rem 0 0.8rem;
    }

    .tag {
      background: #f0f6fc;
      color: #0969da;
      font-size: 0.72rem;
      padding: 0.1rem 0.5rem;
      border-radius: 12px;
      border: 1px solid #d0d7de;
    }

    .card-actions {
      display: flex;
      gap: 0.5rem;
      margin-top: auto;
      border-top: 1px solid #eaeef2;
      padding-top: 0.8rem;
      align-items: center;
      flex-wrap: wrap;
    }

    .btn {
      background: #f6f8fa;
      border: 1px solid #d0d7de;
      border-radius: 2px;
      padding: 0.3rem 0.8rem;
      font-size: 0.8rem;
      font-weight: 500;
      color: #24292f;
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s;
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      text-decoration: none;
      line-height: 1.4;
    }

    .btn:hover {
      background: #eaeef2;
      border-color: #8b949e;
    }

    .btn-primary {
      background: #0969da;
      border-color: #0969da;
      color: #ffffff;
    }

    .btn-primary:hover {
      background: #0860c0;
      border-color: #0860c0;
    }

    .btn-danger {
      color: #cf222e;
      border-color: #d0d7de;
    }

    .btn-danger:hover {
      background: #ffebe9;
      border-color: #cf222e;
    }

    .btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      background: #f6f8fa;
      color: #8b949e;
      border-color: #d0d7de;
    }

    .search-section {
      background: #ffffff;
      border: 1px solid #d0d7de;
      border-radius: 2px;
      padding: 1rem;
      margin-bottom: 1.5rem;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.08);
    }

    .search-row {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 0.8rem;
    }

    .search-input {
      flex: 2;
      min-width: 220px;
      padding: 0.5rem 0.8rem;
      background: #ffffff;
      border: 1px solid #d0d7de;
      border-radius: 2px;
      color: #24292f;
      font-size: 0.9rem;
      transition: border-color 0.2s;
    }

    .search-input:focus {
      outline: none;
      border-color: #0969da;
      box-shadow: 0 0 0 2px rgba(9, 105, 218, 0.15);
    }

    .file-upload-label {
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      background: #f6f8fa;
      border: 1px solid #d0d7de;
      border-radius: 2px;
      padding: 0.5rem 1rem;
      font-size: 0.85rem;
      font-weight: 500;
      color: #24292f;
      cursor: pointer;
      transition: background 0.2s;
    }

    .file-upload-label:hover {
      background: #eaeef2;
    }

    #uploadJsInput {
      display: none;
    }

    .status-message {
      font-size: 0.8rem;
      color: #57606a;
      margin-left: 0.5rem;
    }

    .footer-note {
      margin-top: auto;
      border-top: 1px solid #d0d7de;
      padding-top: 1.2rem;
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      align-items: center;
      color: #57606a;
      font-size: 0.8rem;
    }

    .footer-note a {
      color: #0969da;
      text-decoration: none;
    }

    .footer-note a:hover {
      text-decoration: underline;
    }

    hr {
      border: 0;
      border-top: 1px solid #d0d7de;
      margin: 0.8rem 0;
    }

    a:link {
      color: #0969da !important;
    }

    a:visited {
      color: #0969da !important;
    }

    @media (max-width: 650px) {
      body {
        padding: 1rem 0.8rem;
      }

      .header {
        flex-direction: column;
        align-items: flex-start;
        gap: 0.5rem;
      }

      .extensions-grid {
        grid-template-columns: 1fr;
      }

      .search-row {
        flex-direction: column;
        align-items: stretch;
      }
    }
  </style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="header-left">
      <h1>Decibel Note · Extensions</h1>
      <div class="sub">Discover, install and manage editor extensions</div>
    </div>
    <div class="header-right">
      <a id="refreshInstalledLink" title="Reload installed list">↻ Refresh</a>
      <a id="clearAllLink" title="Remove all installed extensions">Clear all</a>
    </div>
  </div>

  <div class="search-section">
    <div class="search-row">
      <input type="text" class="search-input" id="searchInput" placeholder="Search by name, description or tag...">
      <label for="uploadJsInput" class="file-upload-label" id="uploadLabel">
        📄 Load .js extension
      </label>
      <input type="file" id="uploadJsInput" accept=".js">
      <span class="status-message" id="uploadStatus"></span>
    </div>
    <div style="font-size:0.75rem; color:#57606a; margin-top:0.5rem;">
      Installed extensions are stored locally in your browser. Custom extensions are cached for persistence.
    </div>
  </div>

  <div class="section-title">
    <span>🧩 Available extensions</span>
  </div>

  <div class="extensions-grid" id="extensionsGrid"></div>

  <div class="footer-note">
    <span>Decibel Note extensions · local manager</span>
    <span><a href="#" id="goToDocs">Docs</a> · <a href="#" id="reportIssue">Feedback</a></span>
  </div>
</div>

<script>
  (function() {
    // ----- STORAGE KEYS -----
    const INSTALLED_KEY = 'decibel_extensions';
    const CUSTOM_EXTS_KEY = 'decibel_custom_extensions';

    // ----- DEFAULT EXTENSIONS -----
    const defaultExtensions = [
      {
        id: 'ext1',
        name: 'Code Snippets Pro',
        description: 'A collection of useful code snippets for various programming languages.',
        author: 'Decibel Labs',
        version: '1.0.0',
        path: 'https://bebka16.github.io/note/extensions/snippets.js',
        tags: ['snippets', 'productivity']
      },
      {
        id: 'ext2',
        name: 'Git Integration',
        description: 'Basic Git integration for version control within the editor.',
        author: 'Decibel Labs',
        version: '0.9.0',
        path: 'https://bebka16.github.io/note/extensions/git.js',
        tags: ['git', 'version-control']
      },
      {
        id: 'ext3',
        name: 'Auto Formatter',
        description: 'Automatically format your code on save with customizable rules.',
        author: 'Decibel Labs',
        version: '1.2.1',
        path: 'https://bebka16.github.io/note/extensions/formatter.js',
        tags: ['formatting', 'productivity']
      },
      {
        id: 'ext4',
        name: 'Color Preview',
        description: 'Preview colors in CSS, SCSS, and HTML files directly in the editor.',
        author: 'Decibel Labs',
        version: '0.5.0',
        path: 'https://bebka16.github.io/note/extensions/color-preview.js',
        tags: ['css', 'preview']
      }
    ];

    // ----- CUSTOM EXTENSIONS CACHE -----
    function getCustomExtensions() {
      try {
        return JSON.parse(localStorage.getItem(CUSTOM_EXTS_KEY) || '[]');
      } catch (e) {
        return [];
      }
    }

    function saveCustomExtensions(customExts) {
      localStorage.setItem(CUSTOM_EXTS_KEY, JSON.stringify(customExts));
    }

    // Get all extensions (default + cached custom)
    function getAllExtensions() {
      const custom = getCustomExtensions();
      // Filter out any custom extensions that might have expired blob URLs
      const validCustom = custom.filter(ext => {
        // Blob URLs become invalid after page reload, but we keep the metadata
        // We'll regenerate blob URL from cached code if needed
        return true;
      });
      return [...defaultExtensions, ...validCustom];
    }

    // ----- INSTALLED PATHS -----
    function getInstalledPaths() {
      try {
        return JSON.parse(localStorage.getItem(INSTALLED_KEY) || '[]');
      } catch (e) {
        return [];
      }
    }

    function saveInstalledPaths(paths) {
      localStorage.setItem(INSTALLED_KEY, JSON.stringify(paths));
    }

    function isInstalled(path) {
      return getInstalledPaths().includes(path);
    }

    // ----- COMMUNICATION WITH PARENT -----
    function notifyParentAddExtension(path) {
      try {
        window.parent.postMessage({
          type: 'addExtension',
          path: path
        }, '*');
      } catch (e) {
        console.warn('Unable to post message to parent', e);
      }
    }

    function notifyParentRemoveExtension(path) {
      try {
        window.parent.postMessage({
          type: 'removeExtension',
          path: path
        }, '*');
      } catch (e) {
        console.warn('Unable to post remove message', e);
      }
    }

    // ----- INSTALL / UNINSTALL -----
    function installExtension(path) {
      const installed = getInstalledPaths();
      if (!installed.includes(path)) {
        installed.push(path);
        saveInstalledPaths(installed);
        notifyParentAddExtension(path);
      }
      renderExtensions(getSearchTerm());
    }

    function uninstallExtension(path) {
      let installed = getInstalledPaths();
      if (installed.includes(path)) {
        installed = installed.filter(p => p !== path);
        saveInstalledPaths(installed);
        notifyParentRemoveExtension(path);
        
        // If it's a custom extension, also remove from cache
        const customExts = getCustomExtensions();
        const updatedCustom = customExts.filter(ext => ext.path !== path);
        if (updatedCustom.length !== customExts.length) {
          saveCustomExtensions(updatedCustom);
        }
      }
      renderExtensions(getSearchTerm());
    }

    function clearAllExtensions() {
      const installed = getInstalledPaths();
      if (installed.length === 0) return;
      if (confirm('Remove all installed extensions? This cannot be undone.')) {
        installed.forEach(path => notifyParentRemoveExtension(path));
        saveInstalledPaths([]);
        // Also clear custom extensions
        saveCustomExtensions([]);
        renderExtensions(getSearchTerm());
      }
    }

    // ----- HANDLE JS FILE UPLOAD WITH CACHING -----
    function handleJsFileUpload(file) {
      const statusEl = document.getElementById('uploadStatus');
      if (!file) {
        statusEl.textContent = 'No file selected.';
        return;
      }

      if (!file.name.endsWith('.js')) {
        statusEl.textContent = '❌ Only .js files are allowed.';
        return;
      }

      statusEl.textContent = '⏳ Reading file...';
      const reader = new FileReader();
      
      reader.onload = (e) => {
        const content = e.target.result;
        if (!content || content.trim().length === 0) {
          statusEl.textContent = '❌ File is empty.';
          return;
        }

        // Create blob URL for immediate use
        const blob = new Blob([content], { type: 'application/javascript' });
        const blobUrl = URL.createObjectURL(blob);

        // Generate metadata
        const baseName = file.name.replace(/\.js$/i, '');
        const displayName = baseName
          .replace(/[-_]/g, ' ')
          .replace(/\b\w/g, c => c.toUpperCase());

        const customExt = {
          id: 'custom_' + Date.now() + '_' + Math.random().toString(36).substr(2, 6),
          name: displayName || 'Custom Extension',
          description: `Loaded from ${file.name}`,
          author: 'You (local upload)',
          version: '0.0.0',
          path: blobUrl,
          tags: ['custom', 'uploaded'],
          isCustom: true,
          // Store the source code for caching
          sourceCode: content,
          fileName: file.name
        };

        // Save to custom extensions cache
        const customExts = getCustomExtensions();
        customExts.push(customExt);
        saveCustomExtensions(customExts);

        // Install the extension
        installExtension(blobUrl);
        
        statusEl.textContent = `✅ Installed "${displayName}" from ${file.name} (cached)`;
        document.getElementById('uploadJsInput').value = '';
        renderExtensions(getSearchTerm());
      };

      reader.onerror = () => {
        statusEl.textContent = '❌ Error reading file.';
      };

      reader.readAsText(file);
    }

    // ----- RESTORE CACHED CUSTOM EXTENSIONS ON LOAD -----
    function restoreCustomExtensions() {
      const customExts = getCustomExtensions();
      const installed = getInstalledPaths();
      let needsUpdate = false;

      customExts.forEach(ext => {
        // Recreate blob URL from cached source code
        if (ext.sourceCode && (!ext.path || ext.path.startsWith('blob:'))) {
          const blob = new Blob([ext.sourceCode], { type: 'application/javascript' });
          const newBlobUrl = URL.createObjectURL(blob);
          
          // Update installed paths if old blob URL exists
          if (ext.path && installed.includes(ext.path)) {
            const idx = installed.indexOf(ext.path);
            installed[idx] = newBlobUrl;
            needsUpdate = true;
          }
          
          ext.path = newBlobUrl;
        }
        
        // Auto-install if it was previously installed
        if (ext.path && !installed.includes(ext.path)) {
          // Check if this extension was previously installed (by checking if any path matches)
          const wasInstalled = installed.some(p => 
            customExts.some(ce => ce.path === p || ce.id === ext.id)
          );
          // Don't auto-install on page load, just restore state
        }
      });

      if (needsUpdate) {
        saveInstalledPaths(installed);
        saveCustomExtensions(customExts);
      }
    }

    // ----- RENDERING -----
    function getSearchTerm() {
      return document.getElementById('searchInput')?.value || '';
    }

    function renderExtensions(filter = '') {
      const grid = document.getElementById('extensionsGrid');
      if (!grid) return;

      const allExtensions = getAllExtensions();
      const term = filter.toLowerCase().trim();
      
      const filtered = allExtensions.filter(ext => {
        if (term === '') return true;
        const inName = ext.name.toLowerCase().includes(term);
        const inDesc = ext.description.toLowerCase().includes(term);
        const inTags = ext.tags.some(tag => tag.toLowerCase().includes(term));
        const inAuthor = ext.author.toLowerCase().includes(term);
        return inName || inDesc || inTags || inAuthor;
      });

      if (filtered.length === 0) {
        grid.innerHTML = `<div style="grid-column:1/-1; padding:2rem; text-align:center; color:#57606a; background:#ffffff; border:1px solid #d0d7de; border-radius:2px;">
          No extensions found${term ? ` for "${filter}"` : ''}.
        </div>`;
        return;
      }

      grid.innerHTML = filtered.map(ext => {
        const installed = isInstalled(ext.path);
        const installDisabled = installed;
        const uninstallDisabled = !installed;
        const isCustom = ext.isCustom || false;

        return `
          <div class="extension-card ${isCustom ? 'custom' : ''}">
            ${isCustom ? '<span class="custom-badge">Custom</span>' : ''}
            <div class="extension-name">
              <span>${escapeHtml(ext.name)}</span>
              <span class="version">v${escapeHtml(ext.version)}</span>
            </div>
            <div class="extension-description">${escapeHtml(ext.description)}</div>
            <div class="extension-author">
              <span>👤 ${escapeHtml(ext.author)}</span>
            </div>
            <div class="tag-group">
              ${ext.tags.map(tag => `<span class="tag">${escapeHtml(tag)}</span>`).join('')}
            </div>
            <div class="card-actions">
              <button class="btn btn-primary install-btn" data-path="${escapeHtml(ext.path)}" ${installDisabled ? 'disabled' : ''}>
                ${installed ? '✓ Installed' : 'Install'}
              </button>
              <button class="btn btn-danger uninstall-btn" data-path="${escapeHtml(ext.path)}" ${uninstallDisabled ? 'disabled' : ''}>
                🗑 Remove
              </button>
            </div>
          </div>
        `;
      }).join('');

      // Attach event listeners
      document.querySelectorAll('.install-btn').forEach(btn => {
        btn.addEventListener('click', function() {
          const path = this.getAttribute('data-path');
          if (path && !isInstalled(path)) {
            installExtension(path);
          }
        });
      });

      document.querySelectorAll('.uninstall-btn').forEach(btn => {
        btn.addEventListener('click', function() {
          const path = this.getAttribute('data-path');
          if (path && isInstalled(path)) {
            if (confirm(`Remove extension "${path}"?`)) {
              uninstallExtension(path);
            }
          }
        });
      });
    }

    function escapeHtml(text) {
      return String(text)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    // ----- EVENT BINDING -----
    function bindEvents() {
      const searchInput = document.getElementById('searchInput');
      if (searchInput) {
        searchInput.addEventListener('input', function(e) {
          renderExtensions(e.target.value);
        });
      }

      const uploadInput = document.getElementById('uploadJsInput');
      if (uploadInput) {
        uploadInput.addEventListener('change', function(e) {
          const file = e.target.files[0];
          if (file) {
            handleJsFileUpload(file);
          } else {
            document.getElementById('uploadStatus').textContent = '';
          }
        });
      }

      const refreshLink = document.getElementById('refreshInstalledLink');
      if (refreshLink) {
        refreshLink.addEventListener('click', function(e) {
          e.preventDefault();
          restoreCustomExtensions();
          renderExtensions(getSearchTerm());
          document.getElementById('uploadStatus').textContent = '🔄 List refreshed.';
          setTimeout(() => {
            const el = document.getElementById('uploadStatus');
            if (el) el.textContent = '';
          }, 2000);
        });
      }

      const clearAllLink = document.getElementById('clearAllLink');
      if (clearAllLink) {
        clearAllLink.addEventListener('click', function(e) {
          e.preventDefault();
          clearAllExtensions();
        });
      }

      document.getElementById('goToDocs')?.addEventListener('click', e => {
        e.preventDefault();
        alert('Documentation: manage extensions via this panel.');
      });
      
      document.getElementById('reportIssue')?.addEventListener('click', e => {
        e.preventDefault();
        alert('Feedback: thanks for using Decibel Note extensions.');
      });
    }

    // ----- INIT -----
    restoreCustomExtensions();
    renderExtensions('');
    bindEvents();

    // Listen for storage changes from other tabs
    window.addEventListener('storage', (e) => {
      if (e.key === INSTALLED_KEY || e.key === CUSTOM_EXTS_KEY) {
        renderExtensions(getSearchTerm());
      }
    });
  })();
</script>
</body>
</html>
